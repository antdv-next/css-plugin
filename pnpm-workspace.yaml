packages:
  - packages/*
  - examples/*

catalog:
  antdv-next: ^1.3.0

catalogs:
  dev:
    '@vue/tsconfig': ^0.8.1
    bumpp: ^10.4.1
    tsdown: ^0.20.3
    tsx: ^4.22.1
    unocss: ^66.6.8
  example:
    '@types/node': ^24.12.4
    '@vitejs/plugin-vue': ^6.0.7
    '@vue/tsconfig': ^0.8.1
    typescript: ~5.9.3
    vite: ^8.0.13
    vue: ^3.5.34
    vue-tsc: ^3.2.9
  v3:
    tailwindcss: ^3.4.19
  v4:
    tailwindcss: ^4.3.0

cleanupUnusedCatalogs: true

onlyBuiltDependencies:
  - esbuild

shellEmulator: true

trustPolicy: no-downgrade
